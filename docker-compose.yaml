version: "3.8"

services:
  postgres:
    container_name: postgres-db-compose
    image: postgres:latest
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /data/postgres
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    volumes:
      - db:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - mynetwork
    restart: unless-stopped

networks:
  mynetwork:
    driver: bridge

volumes:
  db:
